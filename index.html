<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Luxury Trial Studio</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- TOP PROGRESS -->
<div class="topbar">
<div class="step" id="s1">Customer</div>
<div class="step" id="s2">Cloth</div>
<div class="step" id="s3">Review</div>
<div class="step" id="s4">Result</div>
</div>

<!-- MAIN APP -->
<div class="app">

<!-- CAMERA STAGE (NEVER CHANGES) -->
<div class="cameraStage">

<video id="video" autoplay playsinline></video>

<div class="glassControls">

<button onclick="switchCamera()">Flip</button>
<button onclick="capture()">Capture</button>

</div>

</div>

<!-- BOTTOM PANEL (CHANGES ONLY CONTENT) -->
<div class="panel">

<div id="panelContent"></div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
