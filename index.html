<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Raymond AI Trial Room</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h2>Raymond AI Virtual Trial Room</h2>
<p>Luxury Store Experience</p>
</header>

<div class="container">

<!-- CUSTOMER CAMERA -->
<div class="card">

<h3>📸 Customer Live Camera</h3>

<video id="video" autoplay playsinline></video>

<button onclick="startCamera()">Start Camera</button>
<button onclick="switchCamera()">Switch Camera</button>
<button onclick="capture()">Capture Customer</button>

<canvas id="canvas" style="display:none;"></canvas>

<img id="preview">

</div>

<!-- CLOTH SELECTION -->
<div class="card">

<h3>👕 Select Outfit (Tap to choose)</h3>

<div class="grid">

<img src="shirt1.jpg" class="cloth" onclick="selectCloth(this)">
<img src="shirt2.jpg" class="cloth" onclick="selectCloth(this)">
<img src="suit1.jpg" class="cloth" onclick="selectCloth(this)">
<img src="pant1.jpg" class="cloth" onclick="selectCloth(this)">

</div>

</div>

<!-- AI ACTION -->
<div class="card">

<button onclick="generateTryOn()">Generate AI Try-On</button>

<div id="result">Ready for luxury experience</div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
