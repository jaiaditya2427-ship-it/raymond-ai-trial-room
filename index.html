<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Trial Room</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h2>Virtual Try-On</h2>
</header>

<div class="container">

<!-- CUSTOMER CAMERA -->
<div class="card">

<h3>📸 Customer Camera</h3>

<video id="video" autoplay playsinline></video>

<button onclick="switchCamera()">🔄 Switch Camera</button>
<button onclick="capture()">📸 Capture Photo</button>

<canvas id="canvas" style="display:none;"></canvas>

<img id="preview">

</div>

<!-- CLOTH SELECT -->
<div class="card">

<h3>👕 Select Cloth</h3>

<img src="shirt1.jpg" onclick="selectCloth(this.src)" width="100">
<img src="shirt2.jpg" onclick="selectCloth(this.src)" width="100">
<img src="suit1.jpg" onclick="selectCloth(this.src)" width="100">

</div>

<!-- RESULT -->
<div class="card">

<button onclick="generateTryOn()">Generate AI Try-On</button>

<div id="result">Result will appear here</div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
