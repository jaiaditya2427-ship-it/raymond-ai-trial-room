<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raymond AI Trial Room</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Raymond AI Virtual Trial Room</h1>
<p>Try outfits before visiting the showroom</p>
</header>

<div class="container">

<input type="file" id="imageInput" accept="image/*">

<img id="preview" src="" alt="Preview">

<select id="outfit">
<option>White Shirt</option>
<option>Black Suit</option>
<option>Blue Blazer</option>
<option>Sherwani</option>
</select>

<button id="tryBtn">
Try Outfit
</button>

<div id="result">
Your AI result will appear here.
</div>

</div>

<script src="app.js"></script>

</body>
</html>
