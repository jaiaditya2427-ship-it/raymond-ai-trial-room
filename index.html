<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raymond AI Trial Room</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h2>Raymond AI Virtual Trial Room</h2>
<p>Sector 9, Panchkula Showroom Experience</p>
</header>

<div class="container">

<!-- CAMERA -->
<div class="card">

<h3>📸 Live Camera</h3>

<video id="video" autoplay playsinline></video>

<button onclick="startCamera()">Start Camera</button>
<button onclick="switchCamera()">Switch Front / Back</button>
<button onclick="capture()">Capture Image</button>

<canvas id="canvas" style="display:none;"></canvas>

<img id="preview">

</div>

<!-- CLOTH SELECT -->
<div class="card">

<h3>👕 Select Outfit</h3>

<div class="grid">
<img src="shirt1.jpg" onclick="selectCloth(this.src)">
<img src="shirt2.jpg" onclick="selectCloth(this.src)">
<img src="suit1.jpg" onclick="selectCloth(this.src)">
<img src="suit2.jpg" onclick="selectCloth(this.src)">
</div>

</div>

<!-- RESULT -->
<div class="card">

<button onclick="generateTryOn()">Generate AI Try-On</button>

<div id="result">Capture photo + select cloth</div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
