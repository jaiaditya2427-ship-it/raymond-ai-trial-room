<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raymond AI Trial Room</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Raymond AI Virtual Trial Room</h1>
<p>Live Camera Fashion Experience</p>
</header>

<div class="container">

<!-- CUSTOMER CAMERA -->
<div class="card">
<h3>📸 Customer Live Camera</h3>
<video id="customerCam" autoplay playsinline></video>
<button onclick="captureCustomer()">Capture Customer</button>
<canvas id="customerCanvas" style="display:none;"></canvas>
<img id="customerPreview">
</div>

<!-- CLOTH CAMERA -->
<div class="card">
<h3>👕 Cloth Live Camera</h3>
<video id="clothCam" autoplay playsinline></video>
<button onclick="captureCloth()">Capture Cloth</button>
<canvas id="clothCanvas" style="display:none;"></canvas>
<img id="clothPreview">
</div>

<!-- ACTION -->
<div class="card">
<button onclick="generateTryOn()">Generate AI Try-On</button>
<div id="result">Capture both images to continue</div>
</div>

</div>

<script src="app.js"></script>

</body>
</html>
