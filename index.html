<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Raymond AI Trial Room</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

</head>

<body>

<header>
<h2>Raymond AI Virtual Trial Room</h2>
<p>Camera + Try On System</p>
</header>

<div class="container">

<div class="card">

<h3>📸 Camera</h3>

<video id="video" autoplay playsinline></video>

<button onclick="startCamera()">Start Camera</button>
<button onclick="switchCamera()">Switch Camera</button>
<button onclick="capture()">Capture</button>

<canvas id="canvas" style="display:none;"></canvas>

<img id="preview">

</div>

<div class="card">

<h3>👕 Select Cloth</h3>

<div class="grid">
<img src="shirt1.jpg" onclick="selectCloth(this.src)">
<img src="shirt2.jpg" onclick="selectCloth(this.src)">
<img src="suit1.jpg" onclick="selectCloth(this.src)">
<img src="suit2.jpg" onclick="selectCloth(this.src)">
</div>

</div>

<div class="card">

<button onclick="generateTryOn()">Generate AI Try-On</button>

<div id="result">Ready</div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
