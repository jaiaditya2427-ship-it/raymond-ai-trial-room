<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raymond Virtual Trial Room</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Raymond AI Trial Room</h1>
<p>Luxury Virtual Try-On Experience</p>
</header>

<div class="container">

<!-- CUSTOMER IMAGE -->
<div class="card">

<h3>1. Customer Photo</h3>
<input type="file" id="personImage" accept="image/*">

<img id="preview">

</div>

<!-- CLOTH SELECTION -->
<div class="card">

<h3>2. Select Outfit</h3>

<div class="grid">

<img src="shirt1.jpg" onclick="selectCloth(this.src)" class="cloth">
<img src="shirt2.jpg" onclick="selectCloth(this.src)" class="cloth">
<img src="suit1.jpg" onclick="selectCloth(this.src)" class="cloth">
<img src="suit2.jpg" onclick="selectCloth(this.src)" class="cloth">

</div>

</div>

<!-- ACTION -->
<div class="card">

<button onclick="generateTryOn()">Generate AI Try-On</button>

<div id="result">Upload photo + select outfit</div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
