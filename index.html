<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Trial Room</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h2>Raymond AI Trial Room</h2>
</header>

<div class="container">

<!-- CAMERA -->
<div class="card">

<h3>📸 Live Camera</h3>

<video id="video" autoplay playsinline></video>

<button onclick="startCamera()">Start Camera</button>
<button onclick="switchMode()">Switch Mode (Customer / Cloth)</button>
<button onclick="switchCamera()">Front / Back</button>
<button onclick="capture()">Capture</button>

<canvas id="canvas" style="display:none;"></canvas>

</div>

<!-- PREVIEWS -->
<div class="card">

<h3>Captured Images</h3>

<p>Customer:</p>
<img id="customerPreview">

<p>Cloth:</p>
<img id="clothPreview">

</div>

<!-- RESULT -->
<div class="card">

<button onclick="generateTryOn()">Generate AI Try-On</button>

<div id="result">Ready</div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
